name: validate skills

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC (weekly per D-11a)

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install skills-ref (pinned alpha)
        run: pip install "skills-ref==0.1.1"

      - name: Validate all skills (skills-ref)
        run: |
          set -e
          # Debug: find where skills-ref was installed
          pip show skills-ref
          find / -name "skills-ref" -type f 2>/dev/null || true
          SKILLS_REF=$(pip show -f skills-ref | grep "^Location:" | awk '{print $2}')
          echo "Package location: $SKILLS_REF"
          ls -la "$(pip show skills-ref | grep '^Location' | cut -d' ' -f2-)/../../../bin/" 2>/dev/null | grep skills || true
          # Run via the entry point directly
          ENTRY=$(pip show -f skills-ref 2>/dev/null | grep "\.\.\/\.\.\//bin/skills-ref" | tr -d ' ')
          echo "Entry: $ENTRY"
          for dir in skills/*/; do
            echo "validating $dir"
            skills-ref validate "$dir" || python -c "
import subprocess, sys, pip, importlib
result = subprocess.run(['python', '-m', 'skills_ref', 'validate', '$dir'])
sys.exit(result.returncode)
"
          done

      - name: Validate all skills (bash belt)
        run: |
          set -e
          bash scripts/validate-frontmatter.sh skills/*/

      - name: Validate plugin + marketplace manifests
        run: |
          # Lightweight JSON syntax check (full validation requires Claude Code binary
          # which isn't on GH runners; structural lint is sufficient here)
          jq . .claude-plugin/plugin.json > /dev/null
          jq . .claude-plugin/marketplace.json > /dev/null
