name: validate skills

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 9 * * 1"   # every Monday at 09:00 UTC (weekly per D-11a)

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills (skills-ref — best-effort alpha)
        # skills-ref 0.1.1 is alpha; continue on install/invocation failure.
        # The bash belt step below provides the primary CI guarantee.
        continue-on-error: true
        run: |
          pip install --user "skills-ref==0.1.1"
          SKILLS_REF=$(pip show -f skills-ref 2>/dev/null | grep "  skills-ref$" | xargs -I{} pip show skills-ref | grep "^Location" | awk '{print $2"/../../../bin/skills-ref"}' | xargs realpath 2>/dev/null || true)
          if [ -z "$SKILLS_REF" ] || [ ! -f "$SKILLS_REF" ]; then
            echo "skills-ref binary not found — skipping (alpha tool, best-effort only)"
            exit 0
          fi
          for dir in skills/*/; do
            echo "validating $dir"
            "$SKILLS_REF" validate "$dir"
          done

      - name: Validate all skills (bash belt)
        run: |
          set -e
          bash scripts/validate-frontmatter.sh skills/*/

      - name: Validate plugin + marketplace manifests
        run: |
          # Lightweight JSON syntax check (full validation requires Claude Code binary
          # which isn't on GH runners; structural lint is sufficient here)
          jq . .claude-plugin/plugin.json > /dev/null
          jq . .claude-plugin/marketplace.json > /dev/null
